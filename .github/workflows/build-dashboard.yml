name: Build Dashboard

on:
  push:
    branches: [main]
    paths:
      - "notebook.ipynb"
      - "scripts/**"
      - ".github/workflows/build-dashboard.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pandas numpy matplotlib seaborn plotly kagglehub nbconvert nbformat jupyter ipykernel

      # Solo hace falta si el dataset pide login (privado o con consentimiento).
      # Para datasets públicos normales, kagglehub no requiere credenciales:
      # https://github.com/Kaggle/kagglehub#authenticate
      - name: Configure Kaggle credentials (opcional)
        if: ${{ secrets.KAGGLE_USERNAME != '' }}
        run: |
          mkdir -p ~/.kaggle
          echo '{"username":"${{ secrets.KAGGLE_USERNAME }}","key":"${{ secrets.KAGGLE_KEY }}"}' > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json

      - name: Execute notebook
        run: |
          jupyter nbconvert --to notebook --execute --output executed.ipynb notebook.ipynb

      - name: Build dashboard HTML
        run: |
          python scripts/build_dashboard.py executed.ipynb index.html

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Auto-actualiza dashboard desde notebook.ipynb"
          git push
